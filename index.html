<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamil | MasK OS Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }
        #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.3; pointer-events: none; }
        
        /* Floating Windows */
        .window { position: fixed; background: rgba(10, 10, 10, 0.98); border: 2px solid #00d2ff; border-radius: 12px; display: none; flex-direction: column; z-index: 100; box-shadow: 0 0 30px rgba(0, 210, 255, 0.4); overflow: hidden; transition: 0.3s; }
        .win-header { background: rgba(255,255,255,0.08); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0, 210, 255, 0.3); cursor: move; }
        .win-content { padding: 15px; overflow-y: auto; flex-grow: 1; color: #fff; }

        /* Window Specific Colors */
        #term-window { width: 600px; height: 400px; top: 15%; left: 5%; border-color: #00ff00; }
        #file-window { width: 500px; height: 450px; top: 20%; right: 10%; border-color: #ffcc00; }
        
        /* Folder & File Grid */
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 20px; text-align: center; }
        .file-item { cursor: pointer; transition: 0.2s; }
        .file-item:hover { transform: scale(1.1); }
        .file-item i { font-size: 3rem; margin-bottom: 5px; }
        .folder-icon { color: #ffcc00; }
        .file-icon { color: #00d2ff; }

        /* Taskbar */
        .taskbar { height: 60px; width: 100%; background: rgba(0, 0, 0, 0.95); position: fixed; bottom: 0; left: 0; display: flex; align-items: center; justify-content: center; border-top: 2px solid #00d2ff; z-index: 1000; }
        .term-trigger { color: #00ff00; font-size: 2rem; cursor: pointer; filter: drop-shadow(0 0 10px #00ff00); transition: 0.3s; }
        .term-trigger:hover { transform: scale(1.2); }

        /* Terminal Input */
        #term-input { background: transparent; border: none; color: #00ff00; outline: none; width: 100%; font-family: 'Courier New', monospace; font-size: 1rem; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div id="term-window" class="window">
        <div class="win-header">
            <span style="color: #00ff00;"><i class="fas fa-terminal"></i> MasK Terminal</span>
            <i class="fas fa-times-circle" onclick="closeWin('term-window')" style="color:#ff5f56; cursor:pointer;"></i>
        </div>
        <div class="win-content" id="term-body" style="background: #000; font-family: 'Courier New', monospace;">
            <div id="history">
                <p style="color: #888;">[ SYSTEM READY ] Type 'help' for commands.</p>
            </div>
            <div style="display: flex;">
                <span style="color:#00ff00">Tamil@MasK:~$ </span>
                <input type="text" id="term-input" onkeydown="handleCmd(event)" autofocus>
            </div>
        </div>
    </div>

    <div id="file-window" class="window">
        <div class="win-header">
            <span style="color: #ffcc00;"><i class="fas fa-folder-open"></i> File Manager</span>
            <i class="fas fa-times-circle" onclick="closeWin('file-window')" style="color:#ff5f56; cursor:pointer;"></i>
        </div>
        <div class="win-content">
            <div id="file-grid" class="file-grid">
                </div>
            <hr style="border: 0.5px solid #333; margin: 20px 0;">
            <p style="font-size: 0.8rem; color: #888;">Upload to folder:</p>
            <input type="file" id="file-upload" onchange="uploadFile()" style="font-size: 0.7rem;">
        </div>
    </div>

    <div class="taskbar">
        <i class="fas fa-terminal term-trigger" onclick="openWin('term-window')"></i>
    </div>

    <script>
        // Matrix Effect
        const canvas = document.getElementById('matrix'); const ctx = canvas.getContext('2d');
        let drops = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; drops = Array(Math.floor(canvas.width / 20)).fill(1); }
        window.onresize = resize; resize();
        function draw() { ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = "#00ff00"; ctx.font = "15px monospace"; drops.forEach((y, i) => { const text = Math.random() > 0.5 ? "0" : "1"; ctx.fillText(text, i * 20, y * 20); if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0; drops[i]++; }); }
        setInterval(draw, 50);

        // Window Controls
        function openWin(id) { document.getElementById(id).style.display = 'flex'; }
        function closeWin(id) { document.getElementById(id).style.display = 'none'; }

        // Folder Logic
        let folders = [];
        let files = [];

        function handleCmd(e) {
            if(e.key === 'Enter') {
                const input = document.getElementById('term-input');
                const history = document.getElementById('history');
                const cmd = input.value.trim().split(' ');
                const action = cmd[0].toLowerCase();
                let output = "";

                if(action === 'mkdir') {
                    const name = cmd[1] || "New_Folder";
                    folders.push(name);
                    updateFileGrid();
                    output = `Folder '${name}' created successfully.`;
                    openWin('file-window');
                } 
                else if(action === 'ls') {
                    output = folders.length > 0 ? "Folders: " + folders.join(', ') : "No folders found.";
                }
                else if(action === 'help') {
                    output = "Commands: mkdir [name], ls, clear, run simulator, help";
                }
                else if(action === 'clear') {
                    history.innerHTML = ""; input.value = ""; return;
                }
                else {
                    output = `bash: command not found: ${action}`;
                }

                history.innerHTML += `<p><span style="color:#00ff00">Tamil@MasK:~$</span> ${input.value}</p><p style="color:#bbb;">> ${output}</p>`;
                input.value = "";
                document.getElementById('term-body').scrollTop = document.getElementById('term-body').scrollHeight;
            }
        }

        function updateFileGrid() {
            const grid = document.getElementById('file-grid');
            grid.innerHTML = "";
            folders.forEach(f => {
                grid.innerHTML += `<div class="file-item"><i class="fas fa-folder folder-icon"></i><p>${f}</p></div>`;
            });
            files.forEach(file => {
                grid.innerHTML += `<div class="file-item"><i class="fas fa-file-image file-icon"></i><p>${file.name}</p></div>`;
            });
        }

        function uploadFile() {
            const fileInput = document.getElementById('file-upload');
            if(fileInput.files.length > 0) {
                files.push({ name: fileInput.files[0].name });
                updateFileGrid();
                alert("File uploaded to MasK OS Storage!");
            }
        }
    </script>
</body>
</html>
