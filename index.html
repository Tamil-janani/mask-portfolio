<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MasK | Portfolio OS</title>
    
  <link rel="manifest" href="manifest.json">
<link rel="icon" href="https://img.icons8.com/neon/96/000000/cpu.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#00d2ff">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }
        #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.3; pointer-events: none; }
        
        /* Profile Card */
        .profile-card { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 320px; background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(0, 210, 255, 0.3); border-radius: 18px; padding: 35px; text-align: center; z-index: 10; }
        .tag { background: #e94560; color: white; display: inline-block; padding: 4px 15px; border-radius: 8px; font-size: 0.65rem; font-weight: bold; margin-bottom: 15px; }
        h1 { color: #00d2ff; text-shadow: 0 0 15px rgba(0, 210, 255, 0.6); margin: 5px 0; }

        /* Workspace Window */
        #workspace-window { position: fixed; top: 5%; left: 3%; right: 3%; bottom: 80px; background: rgba(10, 10, 10, 0.98); border: 2px solid #00d2ff; border-radius: 20px; display: none; flex-direction: column; z-index: 100; box-shadow: 0 0 50px rgba(0, 210, 255, 0.4); }
        .win-header { background: rgba(255,255,255,0.1); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #00d2ff; }
        .win-content { padding: 20px; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 20px; }

        .section-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(0, 210, 255, 0.2); border-radius: 15px; padding: 20px; }
        .section-title { color: #00d2ff; margin-bottom: 15px; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; gap: 10px; text-transform: uppercase; }

        /* Logic Simulator */
        .gate-display { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 10px 0; }
        .gate-select { background: #111; color: #00d2ff; border: 1px solid #00d2ff; padding: 8px; border-radius: 8px; outline: none; margin-bottom: 15px; font-size: 0.8rem; }
        .input-btn { width: 45px; height: 45px; border: 2px solid #00d2ff; background: transparent; color: #00d2ff; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .input-btn.active { background: #00d2ff; color: #000; box-shadow: 0 0 15px #00d2ff; }

        /* Code Box */
        .code-box { background: #0a0a0a; border: 1px solid #333; border-radius: 10px; padding: 15px; font-family: 'Courier New', monospace; font-size: 0.8rem; color: #00ff88; overflow-x: auto; white-space: pre; line-height: 1.4; }

        /* Gallery */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .img-card { background: #fff; border-radius: 8px; padding: 5px; cursor: pointer; text-align: center; }
        .img-card img { width: 100%; height: 90px; object-fit: contain; }
        .img-card p { color: #000; font-size: 0.65rem; font-weight: bold; margin: 5px 0; }

        /* Taskbar */
        .taskbar { height: 65px; width: 100%; background: rgba(0, 0, 0, 0.95); position: fixed; bottom: 0; left: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; border-top: 2px solid #00d2ff; z-index: 1000; box-sizing: border-box; }
        .chip-btn { color: #00d2ff; font-size: 2.2rem; cursor: pointer; transition: 0.3s; }
        .social-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 30px; }
        .social-icon { color: #888; font-size: 1.6rem; text-decoration: none; transition: 0.3s; }
        .social-icon:hover { color: #00d2ff; transform: translateY(-5px); }
        .clock { color: #00d2ff; font-weight: bold; font-size: 0.9rem; }

        /* Zoom Overlay */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; }
        #overlay img { max-width: 90%; max-height: 85%; border: 2px solid #00d2ff; border-radius: 10px; background: white; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="profile-card">
        <div class="tag">VLSI DESIGNER</div>
        <h1>Tamilarasan S</h1>
        <p>Click Chip for Workspace</p>
    </div>

    <div id="workspace-window">
        <div class="win-header">
            <span><i class="fas fa-microchip"></i> MasK_SYSTEM_v13.0</span>
            <i class="fas fa-times-circle" style="color: #ff5f56; cursor: pointer; font-size: 1.6rem;" onclick="toggleWin()"></i>
        </div>
        <div class="win-content">
            
            <div class="section-box">
                <div class="section-title"><i class="fas fa-vial"></i> LIVE LOGIC SIMULATOR</div>
                <div style="text-align: center;">
                    <select id="gateType" class="gate-select" onchange="calc()">
                        <option value="AND">AND GATE</option>
                        <option value="OR">OR GATE</option>
                        <option value="NAND">NAND GATE</option>
                        <option value="NOR">NOR GATE</option>
                        <option value="XOR">XOR GATE</option>
                        <option value="XNOR">XNOR GATE</option>
                        <option value="NOT">NOT GATE</option>
                    </select>
                    <div class="gate-display">
                        <button class="input-btn" id="A" onclick="toggleInput('A')">0</button>
                        <span id="gateSymbol" style="font-size: 1.5rem; color: #e94560;">&</span>
                        <button class="input-btn" id="B" onclick="toggleInput('B')">0</button>
                        <span>=</span>
                        <span id="Y" style="font-size: 2.2rem; color: #00ff88; font-weight: bold;">0</span>
                    </div>
                </div>
            </div>

            <div class="section-box">
                <div class="section-title"><i class="fas fa-file-code"></i> PROJECT_SOURCE_CODE</div>
                <div class="code-box">
// Verilog RTL: 2-to-1 Multiplexer
module mux2x1(input a, b, s, output y);
  assign y = s ? b : a;
endmodule
                </div>
            </div>

            <div class="section-box">
                <div class="section-title"><i class="fas fa-images"></i> CIRCUIT_DOCUMENTS</div>
                <div class="gallery-grid">
                    <div class="img-card" onclick="zoomImg('https://upload.wikimedia.org/wikipedia/commons/thumb/6/64/Logic-gates-extended.svg/640px-Logic-gates-extended.svg.png')">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/64/Logic-gates-extended.svg/640px-Logic-gates-extended.svg.png"><p>GATES</p>
                    </div>
                    <div class="img-card" onclick="zoomImg('https://media.geeksforgeeks.org/wp-content/uploads/20220524171227/fulladderusingXORandNAND.png')">
                        <img src="https://media.geeksforgeeks.org/wp-content/uploads/20220524171227/fulladderusingXORandNAND.png"><p>ADDER</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="overlay" onclick="this.style.display='none'"><img id="zoom-img" src=""></div>

    <div class="taskbar">
        <i class="fas fa-microchip chip-btn" onclick="toggleWin()"></i>
        <div class="social-center">
            <a href="https://linkedin.com/in/tamilarasan-selvam-123abc" target="_blank" class="social-icon"><i class="fab fa-linkedin"></i></a>
            <a href="https://github.com/Tamil-janani" target="_blank" class="social-icon"><i class="fab fa-github"></i></a>
            <a href="https://www.instagram.com/tamilarasan._23" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
        </div>
        <div class="clock" id="clock">00:00:00 PM</div>
    </div>

    <script>
        const canvas = document.getElementById('matrix'); const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        const drops = Array(Math.floor(canvas.width / 20)).fill(1);
        function draw() { ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = "#00d2ff"; ctx.font = "15px monospace"; drops.forEach((y, i) => { ctx.fillText(Math.floor(Math.random()*2), i*20, y*20); if(y*20 > canvas.height && Math.random() > 0.975) drops[i] = 0; drops[i]++; }); }
        setInterval(draw, 50);

        function toggleWin() { const w = document.getElementById('workspace-window'); w.style.display = (w.style.display === 'flex') ? 'none' : 'flex'; }
        function zoomImg(src) { document.getElementById('zoom-img').src = src; document.getElementById('overlay').style.display = 'flex'; }
        
        function toggleInput(id) {
            const b = document.getElementById(id);
            b.innerHTML = (b.innerHTML === "0") ? "1" : "0";
            b.classList.toggle('active');
            calc();
        }

        function calc() {
            const a = parseInt(document.getElementById('A').innerHTML);
            const b = parseInt(document.getElementById('B').innerHTML);
            const gate = document.getElementById('gateType').value;
            let res = 0; let s = "&";
            document.getElementById('B').style.opacity = (gate === "NOT") ? "0.2" : "1";
            if(gate === "AND") { res = a & b; s = "&"; }
            else if(gate === "OR") { res = a | b; s = "≥1"; }
            else if(gate === "NAND") { res = !(a & b) ? 1 : 0; s = "!&"; }
            else if(gate === "NOR") { res = !(a | b) ? 1 : 0; s = "!≥1"; }
            else if(gate === "XOR") { res = a ^ b; s = "=1"; }
            else if(gate === "XNOR") { res = (a === b) ? 1 : 0; s = "⊙"; }
            else if(gate === "NOT") { res = a === 0 ? 1 : 0; s = "¬"; }
            document.getElementById('Y').innerHTML = res;
            document.getElementById('gateSymbol').innerHTML = s;
        }

        setInterval(() => { document.getElementById('clock').innerHTML = new Date().toLocaleTimeString(); }, 1000);
        calc();
    </script>
</body>
</html>
