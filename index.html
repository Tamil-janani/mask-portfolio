<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamil | MasK OS</title>
    <link rel="icon" href="https://img.icons8.com/neon/96/000000/cpu.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }
        #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.35; pointer-events: none; }
        
        /* Desktop: Fully Clean */
        .desktop { display: none; }

        /* Profile Card */
        .profile-card { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 320px; background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(0, 210, 255, 0.3); border-radius: 18px; padding: 35px; text-align: center; z-index: 10; pointer-events: none; }
        .tag { background: #e94560; color: white; display: inline-block; padding: 5px 15px; border-radius: 8px; font-size: 0.65rem; font-weight: bold; margin-bottom: 15px; }
        h1 { color: #00d2ff; text-shadow: 0 0 15px rgba(0, 210, 255, 0.6); margin: 5px 0; font-size: 2rem; letter-spacing: 2px; }

        /* Floating Windows */
        .window { position: fixed; background: rgba(10, 10, 10, 0.98); border: 2px solid #00d2ff; border-radius: 12px; display: none; flex-direction: column; z-index: 100; box-shadow: 0 0 40px rgba(0, 210, 255, 0.4); overflow: hidden; }
        .win-header { background: rgba(255,255,255,0.08); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0, 210, 255, 0.3); }
        .win-content { padding: 15px; overflow-y: auto; flex-grow: 1; }

        /* Independent Window Sizes */
        #term-window { width: 550px; height: 380px; top: 20%; left: 5%; border-color: #00ff00; }
        #sim-window { width: 450px; height: 500px; top: 15%; right: 5%; border-color: #e94560; box-shadow: 0 0 30px rgba(233, 69, 96, 0.3); }

        /* Simulator Styles */
        .gate-select { background: #111; color: #00d2ff; border: 1px solid #00d2ff; padding: 8px; border-radius: 5px; width: 100%; margin-bottom: 15px; outline: none; }
        .logic-btn { padding: 10px 20px; background: transparent; border: 2px solid #00d2ff; color: #00d2ff; cursor: pointer; border-radius: 5px; font-weight: bold; width: 80px; }
        .output-bulb { width: 60px; height: 60px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin: 20px auto; transition: 0.4s; border: 2px solid #555; }
        .code-box { background: #000; border: 1px solid #333; border-radius: 8px; padding: 10px; font-family: 'Courier New', monospace; font-size: 0.75rem; color: #00ff88; white-space: pre; line-height: 1.4; }

        /* TASKBAR: The Only Control Center */
        .taskbar { height: 65px; width: 100%; background: rgba(0, 0, 0, 0.95); position: fixed; bottom: 0; left: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; border-top: 2px solid #00d2ff; z-index: 1000; box-sizing: border-box; }
        .social-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 30px; align-items: center; }
        .social-icon { color: #888; font-size: 1.6rem; transition: 0.3s; cursor: pointer; text-decoration: none; }
        .social-icon:hover { color: #00d2ff; transform: translateY(-5px); }
        
        /* THE GREEN TERMINAL ICON - ONLY IN TASKBAR */
        .term-icon { color: #00ff00; font-size: 1.8rem; cursor: pointer; transition: 0.3s; filter: drop-shadow(0 0 8px #00ff00); }
        .term-icon:hover { transform: scale(1.2); filter: drop-shadow(0 0 15px #00ff00); }
        
        .clock { color: #00d2ff; font-weight: bold; font-size: 0.95rem; }
        #term-input { background: transparent; border: none; color: #00ff00; outline: none; width: 100%; font-family: 'Courier New', monospace; }

        @media (max-width: 600px) { #term-window { width: 95%; left: 2.5%; } #sim-window { width: 95%; right: 2.5%; } }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="profile-card">
        <div class="tag">VLSI DESIGNER</div>
        <h1>Tamil S</h1>
        <p>System Online: Open Terminal Below</p>
    </div>

    <div id="term-window" class="window">
        <div class="win-header">
            <span style="color: #00ff00;"><i class="fas fa-terminal"></i> Tamil@MasK-OS: ~</span>
            <i class="fas fa-times-circle" style="color: #ff5f56; cursor: pointer; font-size: 1.2rem;" onclick="closeWin('term-window')"></i>
        </div>
        <div class="win-content" style="background: #000;">
            <div id="history" style="color: #00ff00; font-family: 'Courier New', monospace; font-size: 0.85rem;">
                <p style="margin:0;">[ OK ] Booting MasK-OS Kernel...</p>
                <p style="margin:0; color:#888;">Type 'run simulator' to start Logic Tool.</p>
            </div>
            <div style="display: flex; gap: 5px; font-family: 'Courier New', monospace; font-size: 0.85rem; margin-top: 5px;">
                <span style="color:#00ff00">Tamil@MasK:~$</span>
                <input type="text" id="term-input" autocomplete="off" onkeydown="handleCommand(event)">
            </div>
        </div>
    </div>

    <div id="sim-window" class="window">
        <div class="win-header" style="border-bottom-color: #e94560;">
            <span style="color: #e94560;"><i class="fas fa-microchip"></i> 7-Gate Simulator v1.0</span>
            <i class="fas fa-times-circle" style="color: #ff5f56; cursor: pointer; font-size: 1.2rem;" onclick="closeWin('sim-window')"></i>
        </div>
        <div class="win-content">
            <select id="gateType" class="gate-select" onchange="updateLogic()">
                <option value="AND">AND GATE</option>
                <option value="OR">OR GATE</option>
                <option value="NAND">NAND GATE</option>
                <option value="NOR">NOR GATE</option>
                <option value="XOR">XOR GATE</option>
                <option value="XNOR">XNOR GATE</option>
                <option value="NOT">NOT GATE</option>
            </select>
            <div style="display: flex; justify-content: center; gap: 20px; margin: 10px 0;">
                <button onclick="toggleInput('A')" id="btn-A" class="logic-btn">A: 0</button>
                <button onclick="toggleInput('B')" id="btn-B" class="logic-btn">B: 0</button>
            </div>
            <div id="gate-output" class="output-bulb">OFF</div>
            <div id="verilog-display" class="code-box">module and_gate(input a, b, output y);
  assign y = a & b;
endmodule</div>
        </div>
    </div>

    <div class="taskbar">
        <div class="clock" id="clock">00:00:00</div>
        <div class="social-center">
            <a href="https://linkedin.com/in/tamilarasan-selvam-123abc" target="_blank" class="social-icon"><i class="fab fa-linkedin"></i></a>
            
            <i class="fas fa-terminal term-icon" onclick="openWin('term-window')" title="Launch Terminal"></i>
            
            <a href="https://github.com/Tamil-janani" target="_blank" class="social-icon"><i class="fab fa-github"></i></a>
            <a href="https://instagram.com/tamilarasan._23" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
        </div>
        <div style="width: 80px;"></div>
    </div>

    <script>
        const canvas = document.getElementById('matrix'); const ctx = canvas.getContext('2d');
        let drops = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; drops = Array(Math.floor(canvas.width / 20)).fill(1); }
        window.onresize = resize; resize();
        function draw() { ctx.fillStyle = "rgba(0, 0, 0, 0.12)"; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = "#00d2ff"; ctx.font = "18px monospace"; drops.forEach((y, i) => { const text = Math.random() > 0.5 ? "0" : "1"; ctx.fillText(text, i * 20, y * 20); if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0; drops[i]++; }); }
        setInterval(draw, 50);

        function openWin(id) { document.getElementById(id).style.display = 'flex'; if(id === 'term-window') setTimeout(() => document.getElementById('term-input').focus(), 150); }
        function closeWin(id) { document.getElementById(id).style.display = 'none'; }

        let inA = 0, inB = 0;
        function toggleInput(g) {
            if(g==='A') { inA = inA?0:1; document.getElementById('btn-A').innerText=`A: ${inA}`; }
            else { inB = inB?0:1; document.getElementById('btn-B').innerText=`B: ${inB}`; }
            updateLogic();
        }

        function updateLogic() {
            const type = document.getElementById('gateType').value;
            const verilog = document.getElementById('verilog-display');
            const btnB = document.getElementById('btn-B');
            let res = 0, code = "";
            btnB.style.opacity = (type === 'NOT') ? '0' : '1';
            btnB.style.pointerEvents = (type === 'NOT') ? 'none' : 'auto';

            if(type==='AND') { res = inA && inB; code = `module and_gate(input a, b, output y);\n  assign y = a & b;\nendmodule`; }
            else if(type==='OR') { res = inA || inB; code = `module or_gate(input a, b, output y);\n  assign y = a | b;\nendmodule`; }
            else if(type==='NAND') { res = !(inA && inB); code = `module nand_gate(input a, b, output y);\n  assign y = ~(a & b);\nendmodule`; }
            else if(type==='NOR') { res = !(inA || inB); code = `module nor_gate(input a, b, output y);\n  assign y = ~(a | b);\nendmodule`; }
            else if(type==='XOR') { res = inA ^ inB; code = `module xor_gate(input a, b, output y);\n  assign y = a ^ b;\nendmodule`; }
            else if(type==='XNOR') { res = !(inA ^ inB); code = `module xnor_gate(input a, b, output y);\n  assign y = ~(a ^ b);\nendmodule`; }
            else if(type==='NOT') { res = !inA; code = `module not_gate(input a, output y);\n  assign y = ~a;\nendmodule`; }
            
            const bulb = document.getElementById('gate-output');
            bulb.innerText = res ? "ON" : "OFF";
            bulb.style.backgroundColor = res ? "#00D2FF" : "#333";
            bulb.style.boxShadow = res ? "0 0 25px #00D2FF" : "none";
            bulb.style.color = res ? "#000" : "#fff";
            verilog.innerText = code;
        }

        function handleCommand(e) {
            if(e.key === 'Enter') {
                const input = document.getElementById('term-input');
                const history = document.getElementById('history');
                const cmd = input.value.toLowerCase().trim();
                let out = "";
                
                if(cmd === 'run simulator') {
                    out = "Initializing Logic Core... [OK]";
                    setTimeout(() => { openWin('sim-window'); }, 500);
                }
                else if(cmd === 'ls') out = "logic_tool.exe  profile.v  projects.sh";
                else if(cmd === 'help') out = "Commands: ls, run simulator, bio, clear";
                else if(cmd === 'clear') { history.innerHTML = ""; input.value = ""; return; }
                else if(cmd === 'bio') out = "Tamil S: VLSI Architect.";
                else out = `bash: command not found: ${cmd}`;

                history.innerHTML += `<p style="margin:0; color:#888;">Tamil@MasK:~$ ${cmd}</p><p style="margin:0;">> ${out}</p>`;
                input.value = ""; history.parentElement.scrollTop = history.parentElement.scrollHeight;
            }
        }
        setInterval(() => { document.getElementById('clock').innerHTML = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
