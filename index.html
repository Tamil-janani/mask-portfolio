<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamil | Portfolio OS</title>
    <link rel="icon" href="https://img.icons8.com/neon/96/000000/cpu.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }
        #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.3; pointer-events: none; }
        .profile-card { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 320px; background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(0, 210, 255, 0.3); border-radius: 18px; padding: 35px; text-align: center; z-index: 10; transition: 0.5s; }
        .tag { background: #e94560; color: white; display: inline-block; padding: 4px 15px; border-radius: 8px; font-size: 0.65rem; font-weight: bold; margin-bottom: 15px; }
        h1 { color: #00d2ff; text-shadow: 0 0 15px rgba(0, 210, 255, 0.6); margin: 5px 0; }
        
        /* Floating Windows */
        .window { position: fixed; background: rgba(10, 10, 10, 0.98); border: 2px solid #00d2ff; border-radius: 15px; display: none; flex-direction: column; z-index: 100; box-shadow: 0 0 40px rgba(0, 210, 255, 0.3); }
        #workspace-window { top: 5%; left: 3%; right: 3%; bottom: 85px; }
        #terminal-window { top: 20%; left: 10%; width: 500px; height: 350px; border-color: #00ff00; box-shadow: 0 0 30px rgba(0, 255, 0, 0.2); }
        
        .win-header { background: rgba(255,255,255,0.05); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0, 210, 255, 0.3); }
        .win-content { padding: 15px; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 15px; }
        
        .section-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(0, 210, 255, 0.15); border-radius: 12px; padding: 15px; }
        .section-title { color: #00d2ff; margin-bottom: 12px; font-size: 0.85rem; font-weight: bold; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
        
        /* Interactive Elements */
        .gate-select { background: #111; color: #00d2ff; border: 1px solid #00d2ff; padding: 6px; border-radius: 5px; margin-bottom: 10px; outline: none; font-size: 0.8rem; }
        .logic-btn { padding: 8px 16px; background: transparent; border: 2px solid #00d2ff; color: #00d2ff; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .output-bulb { width: 45px; height: 45px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #000; transition: 0.3s; }
        .code-box { background: #0a0a0a; border: 1px solid #222; border-radius: 8px; padding: 12px; font-family: 'Courier New', monospace; font-size: 0.75rem; color: #00ff88; white-space: pre; }
        
        /* Taskbar */
        .taskbar { height: 60px; width: 100%; background: rgba(0, 0, 0, 0.9); position: fixed; bottom: 0; left: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; border-top: 2px solid #00d2ff; z-index: 1000; box-sizing: border-box; }
        .chip-btn { color: #00d2ff; font-size: 2rem; cursor: pointer; transition: 0.3s; }
        .social-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 25px; align-items: center; }
        .social-icon, .term-icon { color: #888; font-size: 1.4rem; text-decoration: none; transition: 0.3s; cursor: pointer; }
        .social-icon:hover, .term-icon:hover { color: #00d2ff; transform: translateY(-5px); }
        .term-icon { color: #00ff00; }
        .clock { color: #00d2ff; font-weight: bold; font-size: 0.85rem; }

        /* Terminal Style */
        #term-body { height: 100%; color: #00ff00; font-family: 'Courier New', monospace; font-size: 0.85rem; overflow-y: auto; }
        #term-input { background: transparent; border: none; color: #00ff00; outline: none; width: 100%; font-family: 'Courier New', monospace; }
        
        @media (max-width: 600px) { #terminal-window { width: 90%; left: 5%; } }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="profile-card" id="p-card">
        <div class="tag">VLSI DESIGNER</div>
        <h1>Tamil S</h1>
        <p>Click Chip for Workspace</p>
    </div>

    <div id="workspace-window" class="window">
        <div class="win-header">
            <span><i class="fas fa-microchip"></i> Workspace_v13</span>
            <i class="fas fa-times-circle" style="color: #ff5f56; cursor: pointer;" onclick="closeWin('workspace-window')"></i>
        </div>
        <div class="win-content">
            <div class="section-box">
                <div class="section-title"><i class="fas fa-vial"></i> MULTI-GATE SIMULATOR</div>
                <div style="text-align: center;">
                    <select id="gateType" class="gate-select" onchange="updateLogic()">
                        <option value="AND">AND GATE</option>
                        <option value="OR">OR GATE</option>
                        <option value="NAND">NAND GATE</option>
                        <option value="XOR">XOR GATE</option>
                    </select>
                    <div style="display: flex; justify-content: center; gap: 15px; margin: 10px 0;">
                        <button onclick="toggleInput('A')" id="btn-A" class="logic-btn">A: 0</button>
                        <button onclick="toggleInput('B')" id="btn-B" class="logic-btn">B: 0</button>
                    </div>
                    <div style="display: flex; flex-direction: column; align-items: center;">
                        <div id="gate-output" class="output-bulb">OFF</div>
                    </div>
                </div>
            </div>
            <div class="section-box">
                <div class="section-title"><i class="fas fa-file-code"></i> VERILOG_RTL</div>
                <div id="verilog-display" class="code-box">module and_gate(input a, b, output y);
  assign y = a & b;
endmodule</div>
            </div>
        </div>
    </div>

    <div id="terminal-window" class="window">
        <div class="win-header" style="border-color: #00ff00;">
            <span style="color: #00ff00;"><i class="fas fa-terminal"></i> Tamil@Linux: ~</span>
            <i class="fas fa-times-circle" style="color: #ff5f56; cursor: pointer;" onclick="closeWin('terminal-window')"></i>
        </div>
        <div class="win-content" style="background: rgba(0,0,0,0.95);">
            <div id="term-body">
                <p style="margin:0;">Welcome to MasK OS v13.0.4</p>
                <p style="margin:0; color:#888;">Type 'help' for commands.</p>
                <div id="history"></div>
                <div style="display: flex; gap: 5px;">
                    <span style="color:#00ff00">Tamil@MasK:~$</span>
                    <input type="text" id="term-input" autocomplete="off" onkeydown="handleCommand(event)">
                </div>
            </div>
        </div>
    </div>

    <div class="taskbar">
        <i class="fas fa-microchip chip-btn" onclick="openWin('workspace-window')"></i>
        <div class="social-center">
            <a href="https://linkedin.com/in/tamilarasan-selvam-123abc" target="_blank" class="social-icon"><i class="fab fa-linkedin"></i></a>
            <i class="fas fa-terminal term-icon" onclick="openWin('terminal-window')" title="Terminal"></i>
            <a href="https://github.com/Tamil-janani" target="_blank" class="social-icon"><i class="fab fa-github"></i></a>
            <a href="https://instagram.com/tamilarasan._23" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
        </div>
        <div class="clock" id="clock">00:00:00</div>
    </div>

    <script>
        const canvas = document.getElementById('matrix'); const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        const drops = Array(Math.floor(canvas.width / 20)).fill(1);
        function draw() { ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = "#00d2ff"; ctx.font = "15px monospace"; drops.forEach((y, i) => { ctx.fillText(Math.floor(Math.random()*2), i*20, y*20); if(y*20 > canvas.height && Math.random() > 0.975) drops[i] = 0; drops[i]++; }); }
        setInterval(draw, 50);

        function openWin(id) { 
            document.getElementById(id).style.display = 'flex';
            if(id === 'terminal-window') setTimeout(() => document.getElementById('term-input').focus(), 100);
        }
        function closeWin(id) { document.getElementById(id).style.display = 'none'; }

        let inA = 0, inB = 0;
        function toggleInput(g) {
            if(g==='A') { inA = inA?0:1; document.getElementById('btn-A').innerText=`A: ${inA}`; }
            else { inB = inB?0:1; document.getElementById('btn-B').innerText=`B: ${inB}`; }
            updateLogic();
        }

        function updateLogic() {
            const type = document.getElementById('gateType').value;
            const verilog = document.getElementById('verilog-display');
            let res = 0, code = "";
            if(type==='AND') { res = inA && inB; code = `module and_gate(input a, b, output y);\n  assign y = a & b;\nendmodule`; }
            else if(type==='OR') { res = inA || inB; code = `module or_gate(input a, b, output y);\n  assign y = a | b;\nendmodule`; }
            else if(type==='NAND') { res = !(inA && inB); code = `module nand_gate(input a, b, output y);\n  assign y = ~(a & b);\nendmodule`; }
            else if(type==='XOR') { res = inA ^ inB; code = `module xor_gate(input a, b, output y);\n  assign y = a ^ b;\nendmodule`; }
            
            const bulb = document.getElementById('gate-output');
            bulb.innerText = res ? "ON" : "OFF";
            bulb.style.background = res ? "#00D2FF" : "#333";
            bulb.style.boxShadow = res ? "0 0 20px #00D2FF" : "none";
            verilog.innerText = code;
        }

        function handleCommand(e) {
            if(e.key === 'Enter') {
                const input = document.getElementById('term-input');
                const history = document.getElementById('history');
                const cmd = input.value.toLowerCase().trim();
                let out = "";
                if(cmd === 'help') out = "Available: bio, skills, contact, clear";
                else if(cmd === 'bio') out = "Tamil S: VLSI Design Student & Logic Enthusiast.";
                else if(cmd === 'skills') out = "Verilog, Vivado, CMOS Digital Design, FPGA.";
                else if(cmd === 'contact') out = "Reach me at: tamilarasanselvam@email.com";
                else if(cmd === 'clear') { history.innerHTML = ""; input.value = ""; return; }
                else out = `Command '${cmd}' not found.`;
                history.innerHTML += `<p style="margin:0; color:#888;">Tamil@MasK:~$ ${cmd}</p><p style="margin:0;">> ${out}</p>`;
                input.value = ""; history.parentElement.scrollTop = history.parentElement.scrollHeight;
            }
        }
        setInterval(() => { document.getElementById('clock').innerHTML = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
