<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamil | MasK OS Pro</title>
    <link rel="icon" href="https://img.icons8.com/neon/96/000000/cpu.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }
        #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.35; pointer-events: none; }
        
        /* Profile Card */
        .profile-card { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 320px; background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(0, 210, 255, 0.3); border-radius: 18px; padding: 35px; text-align: center; z-index: 10; pointer-events: none; }
        .tag { background: #e94560; color: white; display: inline-block; padding: 5px 15px; border-radius: 8px; font-size: 0.65rem; font-weight: bold; margin-bottom: 15px; }
        h1 { color: #00d2ff; text-shadow: 0 0 15px rgba(0, 210, 255, 0.6); margin: 5px 0; font-size: 2rem; letter-spacing: 2px; }

        /* Floating Windows */
        .window { position: fixed; background: rgba(10, 10, 10, 0.98); border: 2px solid #00d2ff; border-radius: 12px; display: none; flex-direction: column; z-index: 100; box-shadow: 0 0 40px rgba(0, 210, 255, 0.4); overflow: hidden; }
        .win-header { background: rgba(255,255,255,0.08); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0, 210, 255, 0.3); }
        .win-content { padding: 15px; overflow-y: auto; flex-grow: 1; }

        /* Window Positioning */
        #term-window { width: 550px; height: 380px; top: 15%; left: 5%; border-color: #00ff00; }
        #file-window { width: 500px; height: 400px; top: 20%; right: 5%; border-color: #ffcc00; }
        #sim-window { width: 450px; height: 480px; top: 10%; right: 10%; border-color: #e94560; }

        /* File Explorer Styles */
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 20px; text-align: center; }
        .file-item { cursor: pointer; transition: 0.2s; }
        .file-item i { font-size: 2.5rem; margin-bottom: 5px; }
        .folder-icon { color: #ffcc00; }
        .file-icon { color: #00d2ff; }

        /* TASKBAR FIX: Making it visible and strong */
        .taskbar { height: 65px; width: 100%; background: rgba(0, 0, 0, 0.95); position: fixed; bottom: 0; left: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; border-top: 2px solid #00d2ff; z-index: 1000; box-sizing: border-box; }
        .social-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 35px; align-items: center; }
        .social-icon { color: #888; font-size: 1.6rem; transition: 0.3s; text-decoration: none; cursor: pointer; }
        .social-icon:hover { color: #00d2ff; transform: translateY(-5px); }
        .term-icon { color: #00ff00; font-size: 1.8rem; cursor: pointer; transition: 0.3s; filter: drop-shadow(0 0 5px #00ff00); }
        .term-icon:hover { transform: scale(1.25); filter: drop-shadow(0 0 12px #00ff00); }
        .clock { color: #00d2ff; font-weight: bold; font-size: 0.95rem; }

        /* Input Fix */
        #term-input { background: transparent; border: none; color: #00ff00; outline: none; width: 100%; font-family: 'Courier New', monospace; font-size: 1rem; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="profile-card">
        <div class="tag">VLSI DESIGNER</div>
        <h1>Tamil S</h1>
        <p>Open Terminal in Taskbar</p>
    </div>

    <div id="term-window" class="window">
        <div class="win-header">
            <span style="color: #00ff00;"><i class="fas fa-terminal"></i> Tamil@MasK: ~</span>
            <i class="fas fa-times-circle" style="color: #ff5f56; cursor: pointer; font-size: 1.2rem;" onclick="closeWin('term-window')"></i>
        </div>
        <div class="win-content" id="term-body" style="background: #000; font-family: 'Courier New', monospace;">
            <div id="history" style="color: #00ff00; font-size: 0.85rem;">
                <p>[ OK ] MasK-OS Initialized.</p>
                <p style="color:#888;">Type 'mkdir [name]' or 'run simulator'.</p>
            </div>
            <div style="display: flex; margin-top: 5px;">
                <span style="color:#00ff00">Tamil@MasK:~$ </span>
                <input type="text" id="term-input" onkeydown="handleCmd(event)" autocomplete="off" autofocus>
            </div>
        </div>
    </div>

    <div id="file-window" class="window">
        <div class="win-header">
            <span style="color: #ffcc00;"><i class="fas fa-folder-open"></i> File Explorer</span>
            <i class="fas fa-times-circle" style="color: #ff5f56; cursor: pointer; font-size: 1.2rem;" onclick="closeWin('file-window')"></i>
        </div>
        <div class="win-content">
            <div id="file-grid" class="file-grid"></div>
            <hr style="border: 0.5px solid #333; margin: 20px 0;">
            <input type="file" id="upload-file" onchange="addFile()" style="font-size: 0.7rem;">
        </div>
    </div>

    <div class="taskbar">
        <div class="clock" id="clock">00:00:00</div>
        <div class="social-center">
            <a href="https://linkedin.com/in/tamilarasan-selvam-123abc" target="_blank" class="social-icon"><i class="fab fa-linkedin"></i></a>
            <i class="fas fa-terminal term-icon" onclick="openWin('term-window')" title="Launch Terminal"></i>
            <a href="https://github.com/Tamil-janani" target="_blank" class="social-icon"><i class="fab fa-github"></i></a>
            <a href="https://instagram.com/tamilarasan._23" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
        </div>
        <div style="width: 80px;"></div>
    </div>

    <script>
        // Matrix Rain
        const canvas = document.getElementById('matrix'); const ctx = canvas.getContext('2d');
        let drops = [];
        function resize() { 
            canvas.width = window.innerWidth; canvas.height = window.innerHeight; 
            drops = Array(Math.floor(canvas.width / 20)).fill(1); 
        }
        window.onresize = resize; resize();
        function draw() { 
            ctx.fillStyle = "rgba(0, 0, 0, 0.12)"; ctx.fillRect(0, 0, canvas.width, canvas.height); 
            ctx.fillStyle = "#00d2ff"; ctx.font = "18px monospace"; 
            drops.forEach((y, i) => { 
                const text = Math.random() > 0.5 ? "0" : "1"; 
                ctx.fillText(text, i * 20, y * 20); 
                if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0; 
                drops[i]++; 
            }); 
        }
        setInterval(draw, 50);

        function openWin(id) { document.getElementById(id).style.display = 'flex'; if(id === 'term-window') setTimeout(() => document.getElementById('term-input').focus(), 100); }
        function closeWin(id) { document.getElementById(id).style.display = 'none'; }

        let folders = [];
        let files = [];

        function handleCmd(e) {
            if(e.key === 'Enter') {
                const input = document.getElementById('term-input');
                const history = document.getElementById('history');
                const val = input.value.trim().split(' ');
                const cmd = val[0].toLowerCase();
                let res = "";

                if(cmd === 'mkdir') {
                    const name = val[1] || "New_Folder";
                    folders.push(name); updateGrid();
                    res = `Folder '${name}' created. Opening Explorer...`;
                    openWin('file-window');
                } else if(cmd === 'ls') {
                    res = folders.length > 0 ? "Folders: " + folders.join(', ') : "No folders found.";
                } else if(cmd === 'clear') {
                    history.innerHTML = ""; input.value = ""; return;
                } else if(cmd === 'help') {
                    res = "Commands: mkdir [name], ls, clear, help";
                } else {
                    res = `bash: command not found: ${cmd}`;
                }

                history.innerHTML += `<p style="margin:2px 0;"><span style="color:#00ff00">Tamil@MasK:~$</span> ${input.value}</p><p style="margin:2px 0; color:#bbb;">> ${res}</p>`;
                input.value = "";
                document.getElementById('term-body').scrollTop = document.getElementById('term-body').scrollHeight;
            }
        }

        function updateGrid() {
            const grid = document.getElementById('file-grid'); grid.innerHTML = "";
            folders.forEach(f => grid.innerHTML += `<div class="file-item"><i class="fas fa-folder folder-icon"></i><p style="font-size:0.75rem">${f}</p></div>`);
            files.forEach(file => grid.innerHTML += `<div class="file-item"><i class="fas fa-file-image file-icon"></i><p style="font-size:0.75rem">${file}</p></div>`);
        }

        function addFile() {
            const input = document.getElementById('upload-file');
            if(input.files.length > 0) { files.push(input.files[0].name); updateGrid(); }
        }

        setInterval(() => { document.getElementById('clock').innerHTML = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
